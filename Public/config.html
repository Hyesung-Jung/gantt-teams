<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>간트차트 설정</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #161b27;
      border: 1px solid #2a3245;
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      text-align: center;
    }
    .icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 13px; color: #64748b; margin-bottom: 28px; line-height: 1.6; }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="4" rx="1"/>
        <rect x="3" y="10" width="12" height="4" rx="1"/>
        <rect x="3" y="16" width="8" height="4" rx="1"/>
      </svg>
    </div>
    <h2>프로젝트 간트차트</h2>
    <p>간트차트와 칸반보드로<br/>팀 프로젝트를 함께 관리하세요.</p>
    <button class="btn" onclick="save()">채널에 추가</button>
  </div>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler(saveEvent => {
        microsoftTeams.pages.config.setConfig({
          suggestedDisplayName: '프로젝트 간트',
          entityId: 'gantt-tab',
          contentUrl: 'https://gantt-teams.vercel.app',
          websiteUrl: 'https://gantt-teams.vercel.app',
        });
        saveEvent.notifySuccess();
      });
    });
    function save() {
      microsoftTeams.pages.config.setValidityState(true);
    }
  </script>
</body>
</html>
