<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>프로젝트 간트 설정</title>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
<style>
  body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e2e8f0;padding:32px;margin:0;}
  h2{margin:0 0 12px}
  .ok{color:#10b981;margin-top:16px;font-size:14px}
</style>
</head>
<body>
<h2>📊 프로젝트 간트차트 추가</h2>
<p>이 채널 전용 간트차트가 추가됩니다.<br>아래 "저장" 버튼을 눌러주세요.</p>
<p class="ok">✓ 자동 설정이 완료되었습니다.</p>
<script>
  microsoftTeams.app.initialize().then(() => {
    microsoftTeams.pages.config.registerOnSaveHandler(function (saveEvent) {
      microsoftTeams.app.getContext().then(ctx => {
        const channelId = ctx.channel?.id || ctx.chat?.id || "default";
        // entityId is unique per tab instance — Teams generates it.
        // We pass channelId in the URL so the app knows what to load.
        microsoftTeams.pages.config.setConfig({
          contentUrl: "https://gantt-teams.vercel.app?ch=" + encodeURIComponent(channelId),
          websiteUrl: "https://gantt-teams.vercel.app?ch=" + encodeURIComponent(channelId),
          suggestedDisplayName: "프로젝트 간트",
          entityId: "gantt-" + channelId,
        }).then(() => saveEvent.notifySuccess());
      }).catch(e => saveEvent.notifyFailure(e.message));
    });
    microsoftTeams.pages.config.setValidityState(true);
  });
</script>
</body>
</html>
